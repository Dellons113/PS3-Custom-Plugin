name: Build Custom VSH Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sprx:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Download and Install PS3 Toolchain
      run: |
        ASSET_URL="https://github.com/bucanero/ps3toolchain/releases/download/ubuntu-latest-fad3b5fb/ps3dev-ubuntu-latest-2020-08-31.tar.gz"
        wget -q -O ps3dev.tar.gz "$ASSET_URL"
        sudo tar -xzf ps3dev.tar.gz -C /usr/local/

    - name: Compile SPRX
      run: |
        # 1. Set Path Lingkungan
        export PS3DEV=/usr/local/ps3dev
        export PATH=$PS3DEV/bin:$PS3DEV/ppu/bin:$PS3DEV/spu/bin:$PATH
        
        # 2. Deteksi otomatis lokasi header psl1ght yang krusial
        # Kita cari folder yang mengandung 'ppu_thread.h' agar tidak salah jalur
        PSL1GHT_PATH=$(find $PS3DEV -name "ppu_thread.h" | head -n 1 | xargs dirname | xargs dirname)
        
        echo "PSL1GHT ditemukan di: $PSL1GHT_PATH"
        
        # 3. Masukkan ke dalam CFLAGS agar makefile mengenali path tersebut
        # Kita tambahkan juga path standar ppu/include
        export CFLAGS="-I$PSL1GHT_PATH/include -I$PS3DEV/ppu/include -I."
        
        # 4. Jalankan make
        make CFLAGS="$CFLAGS"

    - name: Upload Plugin SPRX
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Plugin-SPRX
        path: "*.sprx"
