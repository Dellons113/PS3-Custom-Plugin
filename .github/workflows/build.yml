name: Build Custom VSH Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sprx:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

        - name: Install System Dependencies
      run: |
        for i in {1..3}; do sudo apt-get update && break || sleep 10; done
        for i in {1..3}; do sudo apt-get install -y libtool build-essential autoconf automake bison flex libelf-dev libssl-dev texinfo zlib1g-dev pkg-config && break || sleep 10; done
        which libtool || { echo "libtool not found"; exit 1; }

    - name: Prepare Environment
      run: |
        sudo mkdir -p /usr/local/ps3dev
        sudo chown -R $USER:$USER /usr/local/ps3dev
        echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
        echo "PSL1GHT=/usr/local/ps3dev/psl1ght" >> $GITHUB_ENV
        echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/spu/bin" >> $GITHUB_PATH

    - name: Build and Install PS3 Toolchain
      run: |
        git clone https://github.com/ps3dev/ps3toolchain.git /tmp/ps3toolchain
        cd /tmp/ps3toolchain
        chmod +x toolchain.sh
        PS3DEV=${{ env.PS3DEV }} ./toolchain.sh
      timeout-minutes: 120

    - name: Compile SPRX
      run: |
        export PS3DEV=${{ env.PS3DEV }}
        export PSL1GHT=${{ env.PSL1GHT }}
        export PATH=${{ env.PATH }}:/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:/usr/local/ps3dev/spu/bin
        [ -f Makefile ] || { echo "Makefile not found"; exit 1; }
        make

    - name: Upload Plugin SPRX
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Plugin-SPRX
        path: "*.sprx"
