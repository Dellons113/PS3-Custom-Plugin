name: Build Custom VSH Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sprx:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Download and Install PS3 Toolchain Natively
      run: |
        # Mengambil URL rilis toolchain Ubuntu terbaru secara dinamis dari GitHub API
        ASSET_URL=$(curl -s https://api.github.com/repos/ps3dev/ps3toolchain/releases/latest | grep "browser_download_url.*ubuntu.*\.tar\.gz" | head -n 1 | cut -d '"' -f 4)
        wget -O ps3dev.tar.gz "$ASSET_URL"
        sudo tar -xzf ps3dev.tar.gz -C /usr/local/

    - name: Configure Environment and PATH
      run: |
        echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
        echo "PSL1GHT=/usr/local/ps3dev" >> $GITHUB_ENV
        echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH
        # Sangat penting untuk menambahkan spu/bin ke dalam PATH sebelum melanjutkan, 
        # karena skrip pengecekan dependensi toolchain akan gagal (Failed) jika folder ini tidak terdeteksi.
        echo "/usr/local/ps3dev/spu/bin" >> $GITHUB_PATH

    - name: Compile SPRX
      run: |
        make

    - name: Upload Plugin SPRX
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Plugin-SPRX
        path: "*.sprx"
