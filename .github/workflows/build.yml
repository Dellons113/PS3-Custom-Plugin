name: Build Custom VSH Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sprx:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Menambahkan libtool dan pkg-config yang krusial untuk toolchain
        sudo apt-get install -y build-essential autoconf automake bison flex libelf-dev libssl-dev texinfo zlib1g-dev libtool pkg-config

    - name: Prepare Environment
      run: |
        # Membuat direktori dan memberikan izin akses agar bisa ditulis oleh runner
        sudo mkdir -p /usr/local/ps3dev
        sudo chown -R $USER:$USER /usr/local/ps3dev
        
        # Menggunakan GITHUB_ENV agar variabel bertahan di semua langkah berikutnya
        echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
        echo "PSL1GHT=/usr/local/ps3dev/psl1ght" >> $GITHUB_ENV
        
        # Menambahkan ke GITHUB_PATH agar compiler otomatis ditemukan
        echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/spu/bin" >> $GITHUB_PATH

    - name: Build and Install PS3 Toolchain
      run: |
        git clone https://github.com/ps3dev/ps3toolchain.git /tmp/ps3toolchain
        cd /tmp/ps3toolchain
        # Skrip ini sekarang akan mendeteksi variabel yang kita set di GITHUB_ENV
        ./toolchain.sh

    - name: Compile SPRX
      run: |
        # Make sekarang akan melihat ppu-gcc karena path sudah ada di GITHUB_PATH
        make

    - name: Upload Plugin SPRX
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Plugin-SPRX
        path: "*.sprx"
