name: Build Custom VSH Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sprx:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Download and Install PS3 Toolchain
      run: |
        # 1. Unduh dan pasang compiler utama
        wget -q -O ps3dev.tar.gz "https://github.com/bucanero/ps3toolchain/releases/download/ubuntu-latest-fad3b5fb/ps3dev-ubuntu-latest-2020-08-31.tar.gz"
        sudo tar -xzf ps3dev.tar.gz -C /usr/local/
        
        # 2. Setup environment untuk kompilasi PSL1GHT
        export PS3DEV=/usr/local/ps3dev
        export PSL1GHT=/usr/local/ps3dev/psl1ght
        export PATH=$PS3DEV/bin:$PS3DEV/ppu/bin:$PATH
        
        # 3. Clone dan kompilasi PSL1GHT dengan path yang benar
        git clone https://github.com/ps3dev/psl1ght.git /tmp/psl1ght
        cd /tmp/psl1ght
        
        # Ekspor variabel ke environment agar Makefile tidak komplain
        export PSL1GHT=$PS3DEV/psl1ght
        
        # Kompilasi
        make
        sudo make install


    - name: Compile SPRX
      run: |
        export PS3DEV=/usr/local/ps3dev
        export PATH=$PS3DEV/bin:$PS3DEV/ppu/bin:$PS3DEV/spu/bin:$PATH
        
        # Sekarang seharusnya header sudah ada di /usr/local/ps3dev/psl1ght/include
        # Kita jalankan make langsung
        make
        
    - name: Upload Plugin SPRX
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Plugin-SPRX
        path: "*.sprx"
