name: Build Custom VSH Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sprx:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Instal libtool secara terpisah untuk memastikan ketersediaannya
        sudo apt-get install -y libtool
        # Instal dependensi lainnya
        sudo apt-get install -y build-essential autoconf automake bison flex libelf-dev libssl-dev texinfo zlib1g-dev pkg-config
        # Verifikasi bahwa libtool sudah terinstal
        which libtool || (echo "libtool not found"; exit 1)

    - name: Prepare Environment
      run: |
        # Membuat direktori dan memberikan akses penuh
        sudo mkdir -p /usr/local/ps3dev
        sudo chown -R $USER:$USER /usr/local/ps3dev
        
        # Persist variabel ke semua langkah berikutnya
        echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
        echo "PSL1GHT=/usr/local/ps3dev/psl1ght" >> $GITHUB_ENV
        
        # Menambahkan ke PATH sistem agar compiler ditemukan
        echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/spu/bin" >> $GITHUB_PATH

    - name: Build and Install PS3 Toolchain
      run: |
        git clone https://github.com/ps3dev/ps3toolchain.git /tmp/ps3toolchain
        cd /tmp/ps3toolchain
        # Menjalankan skrip instalasi toolchain
        ./toolchain.sh

    - name: Compile SPRX
      run: |
        # Perintah make sekarang akan mengenali ppu-gcc karena PATH sudah diperbarui
        make

    - name: Upload Plugin SPRX
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Plugin-SPRX
        path: "*.sprx"
