name: Build Custom VSH Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sprx:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Download and Install PS3 Toolchain
      run: |
        ASSET_URL="https://github.com/bucanero/ps3toolchain/releases/download/ubuntu-latest-fad3b5fb/ps3dev-ubuntu-latest-2020-08-31.tar.gz"
        wget -q -O ps3dev.tar.gz "$ASSET_URL"
        sudo tar -xzf ps3dev.tar.gz -C /usr/local/

    - name: Compile SPRX
      run: |
        # 1. Menentukan path dasar
        PS3DEV="/usr/local/ps3dev"
        
        # 2. Mencari semua folder 'include' secara otomatis di dalam ps3dev
        # Ini akan otomatis menemukan sys/ppu_thread.h di manapun ia berada
        INCLUDE_FLAGS=$(find $PS3DEV -name include -type d | sed 's/^/-I/')
        
        # 3. Menggabungkan semua path menjadi satu baris CFLAGS
        export CFLAGS=$(echo $INCLUDE_FLAGS | tr '\n' ' ')
        
        echo "Menggunakan CFLAGS: $CFLAGS"
        
        # 4. Menjalankan make dengan CFLAGS hasil pencarian otomatis
        make CFLAGS="$CFLAGS"

    - name: Upload Plugin SPRX
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Plugin-SPRX
        path: "*.sprx"
