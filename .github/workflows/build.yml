name: Build Custom VSH Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sprx:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        set -e
        sudo apt-get update
        sudo apt-get install -y \
          libtool \
          libtool-bin \
          build-essential \
          autoconf \
          automake \
          bison \
          flex \
          libelf-dev \
          libssl-dev \
          texinfo \
          zlib1g-dev \
          pkg-config \
          git \
          wget
        which libtool || { echo "libtool tidak ditemukan!"; exit 1; }

    - name: Prepare Environment
      run: |
        set -e
        sudo mkdir -p /usr/local/ps3dev
        sudo chown -R $USER:$USER /usr/local/ps3dev
        
        echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
        echo "PSL1GHT=/usr/local/ps3dev/psl1ght" >> $GITHUB_ENV
        
        echo "/usr/local/ps3dev/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/ppu/bin" >> $GITHUB_PATH
        echo "/usr/local/ps3dev/spu/bin" >> $GITHUB_PATH

    - name: Build and Install PS3 Toolchain
      run: |
        set -e
        # Clone repo
        git clone --recursive https://github.com/ps3dev/ps3toolchain.git /tmp/ps3toolchain
        cd /tmp/ps3toolchain
        
        # Pastikan direktori archives ada
        mkdir -p archives
        
        # FIX: Menggunakan mirror GCC di GitHub yang jauh lebih stabil daripada Savannah
        wget -O archives/config.guess "https://raw.githubusercontent.com/gcc-mirror/gcc/master/config.guess"
        wget -O archives/config.sub "https://raw.githubusercontent.com/gcc-mirror/gcc/master/config.sub"
        
        # Jalankan skrip instalasi
        ./toolchain.sh

    - name: Compile SPRX
      run: |
        set -e
        # Pastikan kita berada di root directory project
        make

    - name: Upload Plugin SPRX
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Plugin-SPRX
        path: "*.sprx"
