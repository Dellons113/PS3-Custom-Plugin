name: Build Custom VSH Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-sprx:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake bison flex libelf-dev libssl-dev texinfo zlib1g-dev

    - name: Build and Install PS3 Toolchain
      run: |
        # Menggunakan repositori resmi ps3dev/ps3toolchain
        git clone https://github.com/ps3dev/ps3toolchain.git /tmp/ps3toolchain
        cd /tmp/ps3toolchain
        
        # Ekspor lokasi instalasi
        export PS3DEV=/usr/local/ps3dev
        export PATH=$PS3DEV/bin:$PATH
        
        # Jalankan skrip toolchain (ini akan mengompilasi dari source)
        # Note: Ini mungkin memakan waktu beberapa menit
        ./toolchain.sh
        
    - name: Compile SPRX
      run: |
        export PS3DEV=/usr/local/ps3dev
        export PATH=$PS3DEV/bin:$PS3DEV/ppu/bin:$PS3DEV/spu/bin:$PATH
        
        make

    - name: Upload Plugin SPRX
      uses: actions/upload-artifact@v4
      with:
        name: Custom-Plugin-SPRX
        path: "*.sprx"
